body{background-color:var(--bg);color:var(--text);font-family:Inter,sans-serif;margin:0}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--text-muted);border-radius:.75rem}
.glass{backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.card-hover{transition:all .2s}.card-hover:hover{transform:translateY(-1px);box-shadow:0 4px 20px var(--primary-glow)}
.btn-range{transition:all .15s;cursor:pointer;padding:6px 10px;border-radius:8px;font-size:13px;font-family:'Inter',sans-serif;background:var(--btn-bg);color:var(--text-secondary);border:none;text-align:center;text-decoration:none;display:block}
.btn-range:hover{background:var(--btn-hover)}.btn-range.active{background:var(--primary);color:#002e6a;font-weight:600}
.track-link{transition:color .15s;cursor:pointer;text-decoration:none}.track-link:hover{color:var(--primary)}
.cal-btn{display:flex;align-items:center;justify-content:center;border-radius:6px;font-size:13px;cursor:pointer;background:var(--cal-bg);color:var(--text);transition:all .15s;border:none;padding:4px 0;font-family:'Inter',sans-serif;height:44px}
.cal-btn:hover{background:var(--cal-hover)}.cal-btn.sel{background:var(--primary);color:#fff;font-weight:600}
.cal-btn.inr{background:var(--primary-glow)}.cal-btn.oth{opacity:.2;pointer-events:none}.cal-btn.tdy{font-weight:600}
.load-btn{transition:all .15s;cursor:pointer;padding:8px 20px;border-radius:8px;font-size:13px;font-family:'Inter',sans-serif;background:var(--btn-bg);color:var(--text-secondary);border:1px solid var(--border);text-align:center;width:100%}
.load-btn:hover{background:var(--btn-hover);color:var(--text)}
</style>

<script>
var DATA=window.__DATA__,allPlays=[],allArtists=[],stats={};
var pageSize=11,page=0,filtered=[];
var RGS=[{k:'',l:'All'},{k:'today',l:'Day'},{k:'week',l:'Week'},{k:'month',l:'Month'},{k:'year',l:'Year'}];

function fmtLocal(s){
  if(!s)return'';
  var d=new Date(s),mo=d.getMonth(),da=d.getDate(),h=d.getHours(),mi=d.getMinutes();
  return 'Jan Feb Mar Apr May Jun Jul Aug Sep Oct Nov Dec'.split(' ')[mo]+' '+da+' '+String(h).padStart(2,'0')+':'+String(mi).padStart(2,'0');
}
function esc(s){var e=document.createElement('div');e.textContent=s;return e.innerHTML}
function pad2(n){return String(n).padStart(2,'0')}

function init(){
  if(DATA){
    allPlays=DATA.plays||[];
    allArtists=DATA.topArtists||[];
    stats={totalPlays:DATA.totalPlays||0,totalMin:DATA.totalMin||0,streak:DATA.streak||0,
      daily:DATA.daily,filterPlays:DATA.filterPlays||0,filterMin:DATA.filterMin||0};
    filtered=allPlays.slice();
    render();
  }else{
    Promise.all([
      fetch('/api/plays?limit=200').then(function(r){if(!r.ok)throw Error('HTTP '+r.status);return r.json()}),
      fetch('/api/stats').then(function(r){if(!r.ok)throw Error('HTTP '+r.status);return r.json()})
    ]).then(function(res){
      allPlays=res[0]||[];stats=res[1]||{};allArtists=stats.topArtists||[];
      filtered=allPlays.slice();
      document.getElementById('loadBtn').textContent='Load More';
      render();
    }).catch(function(e){
      document.getElementById('loadBtn').textContent='Error: '+e.message;
    });
  }
}

function render(){
  renderSidebar();
  renderCards();
  renderPlays();
  renderHeaderStats();
}
function renderHeaderStats(){
  var d=stats.daily||{};
  var hArtist=document.getElementById('hArtist'),hTrack=document.getElementById('hTrack'),hAlbum=document.getElementById('hAlbum');
  if(hArtist)hArtist.textContent=d.top_artist||'—';
  if(hTrack)hTrack.textContent=d.top_track||'—';
  if(hAlbum)hAlbum.textContent=d.top_album||'—';
}

function renderSidebar(){
  var h='';
  h+='<div class="rounded-xl border glass flex flex-col" style="background-color:var(--bg-card);border-color:var(--border)">';
  h+='<div class="p-3">';
  h+='<h3 class="font-[\'JetBrains_Mono\'] text-xs tracking-wider uppercase mb-2" style="color:var(--text);opacity:.8">Range</h3>';
  h+='<div id="rangeBtns" class="grid grid-cols-5 gap-1 mb-2">';
  for(var i=0;i<RGS.length;i++){
    h+='<a href="#" onclick="setRange(\''+RGS[i].k+'\');return false" class="btn-range" data-rg="'+RGS[i].k+'">'+RGS[i].l+'</a>';
  }
  h+='</div>';
  h+='<div id="activeRange" class="font-[\'Inter\'] text-xs mb-2" style="color:var(--text-muted)">All time</div>';
  h+='<div style="background:var(--bg-glass);border-radius:8px;padding:8px">';
  h+='<div class="flex justify-between items-center mb-1">';
  h+='<button onclick="calMonth(-1)" class="px-2 py-1 rounded" style="color:var(--text-secondary);background:var(--btn-bg);border:none;cursor:pointer;font-size:13px">‹</button>';
  h+='<span id="cL" class="font-[\'JetBrains_Mono\'] text-xs" style="color:var(--text)"></span>';
  h+='<button onclick="calMonth(1)" class="px-2 py-1 rounded" style="color:var(--text-secondary);background:var(--btn-bg);border:none;cursor:pointer;font-size:13px">›</button>';
  h+='</div>';
  h+='<div class="grid grid-cols-7 gap-1 mb-1 text-center font-[\'JetBrains_Mono\'] text-[10px]" style="color:var(--text-muted)"><div>M</div><div>T</div><div>W</div><div>T</div><div>F</div><div>S</div><div>S</div></div>';
  h+='<div class="grid grid-cols-7 gap-1" id="cG"></div></div></div></div>';
  h+='<div class="rounded-xl border glass p-2.5 shrink-0" style="background-color:var(--bg-card);border-color:var(--border)">';
  h+='<h3 class="font-[\'JetBrains_Mono\'] text-[11px] tracking-wider uppercase mb-1" style="color:var(--text);opacity:.8">Filtered</h3>';
  h+='<div class="space-y-0"><div class="flex justify-between py-0" style="border-bottom:1px solid var(--border-light)"><span class="font-[\'Inter\'] text-xs" style="color:var(--text-secondary)">Plays</span><span class="font-[\'Geist\'] text-sm font-semibold" style="color:var(--text)" id="fPlays">0</span></div>';
  h+='<div class="flex justify-between py-0" style="border-bottom:1px solid var(--border-light)"><span class="font-[\'Inter\'] text-xs" style="color:var(--text-secondary)">Minutes</span><span class="font-[\'Geist\'] text-sm font-semibold" style="color:var(--text)" id="fMin">0</span></div>';
  h+='<div class="flex justify-between py-0" style="border-bottom:1px solid var(--border-light)"><span class="font-[\'Inter\'] text-xs" style="color:var(--text-secondary)">Hours</span><span class="font-[\'Geist\'] text-sm font-semibold" style="color:var(--text)" id="fHours">0</span></div>';
  h+='<div class="flex justify-between py-0" style="border-bottom:1px solid var(--border-light)"><span class="font-[\'Inter\'] text-xs" style="color:var(--text-secondary)">Days</span><span class="font-[\'Geist\'] text-sm font-semibold" style="color:var(--text)" id="fDays">0</span></div>';
  h+='<div class="flex justify-between py-0" style="border-bottom:1px solid var(--border-light)"><span class="font-[\'Inter\'] text-xs" style="color:var(--text-secondary)">Avg/Day</span><span class="font-[\'Geist\'] text-sm font-semibold" style="color:var(--text)" id="fAvg">0</span></div>';
  h+='<div class="flex justify-between py-0" style="border-bottom:1px solid var(--border-light)"><span class="font-[\'Inter\'] text-xs" style="color:var(--text-secondary)">Streak</span><span class="font-[\'Geist\'] text-sm font-semibold" style="color:var(--text)" id="fStreak">0</span></div>';
  h+='<div class="flex justify-between items-center py-0" style="border-bottom:1px solid var(--border-light)"><span class="font-[\'Inter\'] text-xs" style="color:var(--text-secondary)">Top Artist</span><span class="font-[\'Inter\'] text-xs font-medium truncate ml-2" style="color:var(--text);max-width:140px" id="fTopArtist">—</span></div>';
  h+='<div class="flex justify-between items-center py-0" style="border-bottom:1px solid var(--border-light)"><span class="font-[\'Inter\'] text-xs" style="color:var(--text-secondary)">Top Track</span><span class="font-[\'Inter\'] text-xs font-medium truncate ml-2" style="color:var(--text);max-width:140px" id="fTopTrack">—</span></div>';
  h+='<div class="flex justify-between items-center py-0"><span class="font-[\'Inter\'] text-xs" style="color:var(--text-secondary)">Top Album</span><span class="font-[\'Inter\'] text-xs font-medium truncate ml-2" style="color:var(--text);max-width:140px" id="fTopAlbum">—</span></div></div></div>';
  document.getElementById('sidePanel').innerHTML=h;
  calInit();
}

function renderArtists(){
  var el=document.getElementById('artistList'),h='';
  for(var i=0;i<allArtists.length;i++){
    var a=allArtists[i];
    h+='<div class="flex justify-between items-center py-1.5 px-2 rounded-lg" style="border-bottom:1px solid var(--border-light)">';
    if(a.spotify_id){
      h+='<a href="https://open.spotify.com/artist/'+esc(a.spotify_id)+'" target="_blank" rel="noopener" class="track-link font-[\'Inter\'] text-sm truncate" style="color:var(--text)">'+esc(a.artist_name)+'</a>';
    }else{
      h+='<span class="font-[\'Inter\'] text-sm truncate" style="color:var(--text)">'+esc(a.artist_name)+'</span>';
    }
    h+='<span class="font-[\'JetBrains_Mono\'] text-xs shrink-0 ml-2" style="color:var(--text-muted)">'+a.play_count+'</span></div>';
  }
  if(el)el.innerHTML=h;
}

function renderCards(){
  var d=stats.daily||{};
  document.getElementById('statCards').innerHTML=
    '<div class="rounded-lg p-2 border" style="background-color:var(--bg-card);border-color:var(--border)"><span class="font-[\'JetBrains_Mono\'] text-[9px] tracking-wider uppercase" style="color:var(--text-muted)">Plays</span><p class="font-[\'Geist\'] text-xl font-semibold" style="color:var(--text)">'+(stats.totalPlays||0)+'</p></div>'+
    '<div class="rounded-lg p-2 border" style="background-color:var(--bg-card);border-color:var(--border)"><span class="font-[\'JetBrains_Mono\'] text-[9px] tracking-wider uppercase" style="color:var(--text-muted)">Minutes</span><p class="font-[\'Geist\'] text-xl font-semibold" style="color:var(--text)">'+(stats.totalMin||0)+'</p></div>'+
    '<div class="rounded-lg p-2 border" style="background-color:var(--bg-card);border-color:var(--border)"><span class="font-[\'JetBrains_Mono\'] text-[9px] tracking-wider uppercase" style="color:var(--text-muted)">Streak</span><p class="font-[\'Geist\'] text-xl font-semibold" style="color:var(--text)">'+(stats.streak||0)+'d</p></div>'+
    '<div class="rounded-lg p-2 border" style="background-color:var(--bg-card);border-color:var(--border)"><span class="font-[\'JetBrains_Mono\'] text-[9px] tracking-wider uppercase" style="color:var(--text-muted)">Today</span><p class="font-[\'Geist\'] text-xl font-semibold" style="color:var(--text)">'+(d.total_plays||0)+'</p></div>';

function renderPlays(){
  var start=0,end=Math.min(pageSize,filtered.length);

  end=Math.min(start+pageSize,filtered.length);
  var list=document.getElementById('playList'),h='';

    h+='<a href="https://open.spotify.com/track/'+esc(sp)+'" target="_blank" rel="noopener" class="track-link block no-underline" style="color:inherit">';

    h+='<div class="min-w-0 flex-1 flex flex-wrap items-baseline gap-x-1.5"><span class="font-[\'Inter\'] text-sm font-medium truncate max-w-full" style="color:var(--text)">'+esc(tn)+'</span>';
    h+='<span class="font-[\'Inter\'] text-[11px]" style="color:var(--text-secondary)">· '+esc(an)+'</span>';
    if(al)h+='<span class="font-[\'Inter\'] text-[11px] w-full" style="color:var(--text-muted)">'+esc(al)+'</span>';
    h+='</div></div>';
    h+='<div class="hidden sm:grid grid-cols-12 gap-3 items-center px-5 py-3">';
    h+='<div class="col-span-2 font-[\'JetBrains_Mono\'] text-xs" style="color:var(--text-muted)">'+fmtLocal(p.played_at)+'</div>';
    h+='<div class="col-span-4 font-[\'Inter\'] text-sm truncate font-medium" style="color:var(--text)">'+esc(tn)+'</div>';
    h+='<div class="col-span-3 font-[\'Inter\'] text-sm truncate" style="color:var(--text-secondary)">'+esc(an)+'</div>';
    h+='<div class="col-span-3 font-[\'Inter\'] text-sm truncate" style="color:var(--text-secondary)">'+esc(al)+'</div>';
    h+='</div></a></div>';
  }
  if(!h)h='<div class="px-5 py-10 text-center font-[\'Inter\'] text-sm italic" style="color:var(--text-secondary)">No plays in this range.</div>';
  list.innerHTML=h;
  var totalPages=Math.ceil(filtered.length/pageSize);
  var nav=document.getElementById('loadBtn');
  if(totalPages<=1){
    nav.innerHTML='<span class="font-[\'Inter\'] text-xs" style="color:var(--text-muted)">'+(filtered.length||'No')+' plays</span>';
  }else{
    var l='<button onclick="goPage('+(page-1)+')" class="px-3 py-1 rounded" style="background:var(--btn-bg);color:var(--text-secondary);border:none;cursor:pointer;font-size:14px;'+(page<=0?'opacity:0.3;pointer-events:none':'')+'">‹</button>';
    l+='<span class="mx-3 font-[\'JetBrains_Mono\'] text-xs" style="color:var(--text-muted)">'+(page+1)+'/'+totalPages+'</span>';
    l+='<button onclick="goPage('+(page+1)+')" class="px-3 py-1 rounded" style="background:var(--btn-bg);color:var(--text-secondary);border:none;cursor:pointer;font-size:14px;'+(page>=totalPages-1?'opacity:0.3;pointer-events:none':'')+'">›</button>';
    nav.innerHTML=l;
  }
  
  var fPlays=filtered.length,fMin=0,topArtist='',topTrack='',topAlbum='',topCount=0,artistCount={},trackCount={},albumCount={},daysSet={};
  for(var i=0;i<filtered.length;i++){
    var p=filtered[i];fMin+=((p.track&&p.track.duration_ms)||0);
    var arts=(p.artists||'').split(', ');
    for(var a=0;a<arts.length;a++){
      var name=arts[a];if(!name)continue;
      artistCount[name]=(artistCount[name]||0)+1;
      if(artistCount[name]>topCount){topCount=artistCount[name];topArtist=name;}
    }
    var tn=(p.track&&p.track.name)||'';
    trackCount[tn]=(trackCount[tn]||0)+1;
    var al=(p.album&&p.album.name)||'';
    if(al)albumCount[al]=(albumCount[al]||0)+1;
    var pd=(p.played_at||'').slice(0,10);
    if(pd)daysSet[pd]=1;
  }
  var tc=0;for(var k in trackCount)if(trackCount[k]>tc){tc=trackCount[k];topTrack=k}
  var ac=0;for(var k in albumCount)if(albumCount[k]>ac){ac=albumCount[k];topAlbum=k}
  var days=Object.keys(daysSet).length;
  var fHours=document.getElementById('fHours');
  var fDays=document.getElementById('fDays');
  var fAvg=document.getElementById('fAvg');
  var fTopTrack=document.getElementById('fTopTrack');
  var fTopAlbum=document.getElementById('fTopAlbum');
  document.getElementById('fPlays').textContent=fPlays;
  document.getElementById('fMin').textContent=Math.floor(fMin/60000);
  if(fHours)fHours.textContent=Math.floor(fMin/60000/60*10)/10;
  if(fDays)fDays.textContent=days;
  if(fAvg)fAvg.textContent=days>0?Math.round(fPlays/days):0;
  document.getElementById('fStreak').textContent=(stats.streak||0)+'d';
  var ft=document.getElementById('fTopArtist');
  if(ft)ft.textContent=topArtist||'—';
  if(fTopTrack)fTopTrack.textContent=topTrack||'—';
  if(fTopAlbum)fTopAlbum.textContent=topAlbum||'—';
  
  var ar=document.getElementById('activeRange');
  if(ar){
    if(curRange==='today')ar.textContent='Showing: Today';
    else if(curRange==='week')ar.textContent='Showing: Last 7 days';
    else if(curRange==='month')ar.textContent='Showing: Last 30 days';
    else if(curRange==='year')ar.textContent='Showing: Last year';
    else if(calF&&calT){
      if(calF===calT)ar.textContent='Showing: '+calF;
      else ar.textContent='Showing: '+calF+' to '+calT;
    }
    else ar.textContent='Showing: All time';
  }
}

function goPage(n){
  page=n;
  renderPlays();
}


var curRange='';

function setRange(rg){
  curRange=rg;
  var btns=document.querySelectorAll('#rangeBtns .btn-range');
  for(var i=0;i<btns.length;i++){btns[i].classList.remove('active')}
  for(var i=0;i<btns.length;i++){if(btns[i].getAttribute('data-rg')===rg){btns[i].classList.add('active');break}}
  var now=new Date(),from=null;
  if(rg==='today'){from=new Date(now.getFullYear(),now.getMonth(),now.getDate())}
  else if(rg==='week'){from=new Date(now.getTime()-7*86400000)}
  else if(rg==='month'){from=new Date(now.getTime()-30*86400000)}
  else if(rg==='year'){from=new Date(now.getTime()-365*86400000)}
  if(from){
    filtered=[];
    for(var i=0;i<allPlays.length;i++){
      var d=new Date(allPlays[i].played_at);
      if(d>=from)filtered.push(allPlays[i]);
    }
  }else{
    filtered=allPlays.slice();
  }
  page=0;calF=null;calT=null;
  renderPlays();renderHeaderStats();calRender();
}


var calD=new Date(),calF=null,calT=null;

function calInit(){
  calRender();
}
function calMonth(n){calD.setMonth(calD.getMonth()+n);calRender()}
function calRender(){
  var y=calD.getFullYear(),m=calD.getMonth(),fD=new Date(y,m,1).getDay(),dm=new Date(y,m+1,0).getDate(),dp=new Date(y,m,0).getDate();
  var wd=fD===0?6:fD-1;
  var td=new Date();td=new Date(td.getFullYear(),td.getMonth(),td.getDate());
  var tds=td.getFullYear()+'-'+pad2(td.getMonth()+1)+'-'+pad2(td.getDate());
  var label=new Date(y,m).toLocaleDateString('en',{month:'long',year:'numeric'});
  var cl=document.getElementById('cL');if(cl)cl.textContent=label;
  var h='',i,d,ds,cls;
  for(i=0;i<wd;i++){d=dp-wd+1+i;h+='<div class="cal-btn oth">'+d+'</div>'}
  for(d=1;d<=dm;d++){
    ds=y+'-'+pad2(m+1)+'-'+pad2(d);
    cls='cal-btn';
    if(ds===tds)cls+=' tdy';
    if(calF&&calT&&ds>=calF&&ds<=calT)cls+=' inr';
    if(ds===calF||ds===calT)cls+=' sel';
    h+='<div class="'+cls+'" onclick="calPick(\''+ds+'\')">'+d+'</div>';
  }
  var rem=(7-(wd+dm)%7)%7;
  for(i=1;i<=rem;i++)h+='<div class="cal-btn oth">'+i+'</div>';
  var cg=document.getElementById('cG');if(cg)cg.innerHTML=h;
}
function calPick(d){
  calF=d;calT=d;
  filtered=[];
  for(var i=0;i<allPlays.length;i++){
    var pd=allPlays[i].played_at.slice(0,10);
    if(pd===d)filtered.push(allPlays[i]);
  }
  page=0;curRange='';
  var btns=document.querySelectorAll('#rangeBtns .btn-range');
  for(var i=0;i<btns.length;i++)btns[i].classList.remove('active');
  renderPlays();
  calRender();
}
init();
</script>
</body>
</html>
