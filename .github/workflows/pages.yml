name: Deploy Dashboard

on:
  push:
    branches: [main]
  workflow_run:
    workflows: [Collector]
    types:
      - completed

permissions:
  contents: write

concurrency:
  group: pages

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Build static site
        env:
          DB_PATH: music.db
        run: go run . build-site

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: _site
          publish_branch: gh-pages
          user_name: muse-journ-bot
          user_email: bot@muse-journ.local
